<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistaar QAOA | Traffic Graph Init</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #05050A;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* Glassmorphic Overlay UI */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to 3D if needed */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
            background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15), transparent 50%);
        }

        .header-panel {
            text-align: center;
            animation: fadeInDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        .stage-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #a5b4fc;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .title {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-top: 10px;
            font-weight: 300;
        }

        .side-panel {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 380px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideInRight 1s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateX(40px);
        }

        .panel-header {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #cbd5e1;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        .log-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .log-item {
            margin-bottom: 12px;
            padding-left: 15px;
            position: relative;
            opacity: 0;
        }

        .log-item::before {
            content: '>';
            position: absolute;
            left: 0;
            color: #818cf8;
        }

        .log-item.active {
            color: #f8fafc;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Animations */
        @keyframes fadeInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInLog {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="webgl-container"></div>

    <div class="ui-layer">
        <div class="header-panel">
            <div class="stage-badge">Initialization Sequence</div>
            <h1 class="title">Traffic Graph Initialization</h1>
            <div class="subtitle" id="main-status">Data preparation started...</div>
        </div>

        <div class="side-panel">
            <div class="panel-header">
                <div class="live-dot"></div>
                QAOA Engine Telemetry
            </div>
            <ul class="log-list" id="log-list">
                <!-- Logs populated by JS -->
            </ul>
        </div>
    </div>

    <script>
        // --- SOCKET CONNECTION ---
        const socket = io();
        
        // Notify backend to print QAOA algorithm steps
        socket.emit('start_qaoa_algorithm', { status: 'init' });

        // --- THREE.JS SCENE SETUP ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x05050A, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0x818cf8, 2, 50);
        pointLight1.position.set(10, 10, 10);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xe879f9, 2, 50);
        pointLight2.position.set(-10, 5, -10);
        scene.add(pointLight2);

        // --- GRAPH DATA ---
        // Nodes (Hospitals, Intersections)
        const nodesData = [
            { id: 'Base', pos: new THREE.Vector3(0, 0, 0), color: 0x22c55e, type: 'hospital' },
            { id: 'Node1', pos: new THREE.Vector3(-8, 2, -5), color: 0x818cf8, type: 'intersection' },
            { id: 'Node2', pos: new THREE.Vector3(5, -1, -8), color: 0x818cf8, type: 'intersection' },
            { id: 'Node3', pos: new THREE.Vector3(10, 3, 2), color: 0x818cf8, type: 'intersection' },
            { id: 'Node4', pos: new THREE.Vector3(-5, -2, 8), color: 0x818cf8, type: 'intersection' },
            { id: 'Patient', pos: new THREE.Vector3(12, 1, 10), color: 0xef4444, type: 'patient' },
        ];

        const edgesData = [
            [0, 1], [0, 2], [0, 4],
            [1, 2], [1, 4],
            [2, 3],
            [3, 5],
            [4, 5]
        ];

        // --- MESH CREATION ---
        const nodeMeshes = [];
        const edgeLines = [];
        const trafficParticles = [];

        // Base Grid
        const gridHelper = new THREE.GridHelper(50, 20, 0x334155, 0x1e293b);
        gridHelper.position.y = -5;
        scene.add(gridHelper);

        // Animation state variables
        let animationStep = 0;
        let clock = new THREE.Clock();

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Rotate camera slowly
            camera.position.x = Math.sin(time * 0.1) * 30;
            camera.position.z = Math.cos(time * 0.1) * 30;
            camera.lookAt(0, 0, 0);

            // Animate traffic particles
            trafficParticles.forEach(p => {
                p.progress += p.speed;
                if(p.progress > 1) p.progress = 0;
                
                const start = p.edge.startPos;
                const end = p.edge.endPos;
                p.mesh.position.lerpVectors(start, end, p.progress);
            });

            // Pulse node sizes slightly
            nodeMeshes.forEach(mesh => {
                if(mesh.scale.x > 0.1) {
                    const pulse = 1 + Math.sin(time * 3 + mesh.position.x) * 0.05;
                    mesh.scale.set(mesh.baseScale * pulse, mesh.baseScale * pulse, mesh.baseScale * pulse);
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        // --- SEQUENCE LOGIC ---
        
        function createNodes() {
            const geometry = new THREE.SphereGeometry(1, 32, 32);
            nodesData.forEach((data, index) => {
                const material = new THREE.MeshPhysicalMaterial({ 
                    color: data.color,
                    emissive: data.color,
                    emissiveIntensity: 0.5,
                    roughness: 0.2,
                    metalness: 0.8,
                    transparent: true,
                    opacity: 0
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.copy(data.pos);
                mesh.baseScale = data.type === 'hospital' || data.type === 'patient' ? 1.5 : 1.0;
                mesh.scale.set(0.01, 0.01, 0.01);
                scene.add(mesh);
                nodeMeshes.push(mesh);

                // Intro animation per node
                setTimeout(() => {
                    let s = 0;
                    const grow = setInterval(() => {
                        s += 0.05;
                        mesh.material.opacity = s;
                        mesh.scale.set(mesh.baseScale * s, mesh.baseScale * s, mesh.baseScale * s);
                        if(s >= 1) clearInterval(grow);
                    }, 30);
                }, index * 200);
            });
        }

        function createEdges() {
            edgesData.forEach((edgeIndices, index) => {
                const start = nodesData[edgeIndices[0]].pos;
                const end = nodesData[edgeIndices[1]].pos;

                const material = new THREE.LineBasicMaterial({
                    color: 0x4f46e5,
                    transparent: true,
                    opacity: 0
                });

                const points = [start, end];
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geometry, material);
                scene.add(line);
                edgeLines.push(line);

                // Draw line animation
                setTimeout(() => {
                    let o = 0;
                    const fade = setInterval(() => {
                        o += 0.05;
                        line.material.opacity = o * 0.5; // Max opacity 0.5
                        if(o >= 1) clearInterval(fade);
                    }, 50);
                }, index * 150);
            });
        }

        function spawnTraffic() {
            const particleGeo = new THREE.SphereGeometry(0.2, 8, 8);
            const particleMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8 });

            edgesData.forEach((edgeIndices) => {
                const start = nodesData[edgeIndices[0]].pos;
                const end = nodesData[edgeIndices[1]].pos;
                
                // Spawn 2-3 particles per edge to simulate weight
                const numParticles = Math.floor(Math.random() * 2) + 2;
                
                for(let i=0; i<numParticles; i++) {
                    const mesh = new THREE.Mesh(particleGeo, particleMat);
                    scene.add(mesh);
                    trafficParticles.push({
                        mesh: mesh,
                        edge: { startPos: start, endPos: end },
                        progress: Math.random(),
                        speed: 0.005 + Math.random() * 0.01
                    });
                }
            });
        }

        const logContainer = document.getElementById('log-list');
        const mainStatus = document.getElementById('main-status');

        function appendLog(text) {
            const li = document.createElement('li');
            li.className = 'log-item';
            li.innerText = text;
            li.style.animation = `fadeInLog 0.5s forwards`;
            logContainer.appendChild(li);

            // Highlight latest
            document.querySelectorAll('.log-item').forEach(el => el.classList.remove('active'));
            li.classList.add('active');
            
            // Auto scroll if needed
            logContainer.parentElement.scrollTop = logContainer.parentElement.scrollHeight;
        }

        // --- DYNAMIC SOCKET LISTENERS ---
        socket.on('qaoa_log', (data) => {
            appendLog(data.msg);
        });

        socket.on('qaoa_stage', (data) => {
            if(data.msg) {
                mainStatus.innerText = data.msg;
            }
            
            if(data.stage === 'nodes') {
                createNodes();
            } else if (data.stage === 'edges') {
                createEdges();
            } else if (data.stage === 'traffic') {
                spawnTraffic();
            } else if (data.stage === 'complete') {
                mainStatus.style.color = "#4ade80";
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const patientId = urlParams.get('patient_id') || 'UNKNOWN';
                    window.location.href = '/qaoa_stage2?patient_id=' + patientId;
                }, 3000);
            }
        });

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
